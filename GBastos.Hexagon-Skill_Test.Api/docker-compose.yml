version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: GBastos.Hexagon-Skill_Test.Api/Dockerfile
    container_name: hexagon-api
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=HexagonDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
   #  - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__HostName=localhost
      - RabbitMQ__QueueName=usuarios
      - RabbitMQ__Username=${RABBITMQ_DEFAULT_USER}
      - RabbitMQ__Password=${RABBITMQ_DEFAULT_PASS}
      - RabbitMQ__Port=5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_started
    restart: always

  frontend:
    build:
      context: ./GBastos.Hexagon-Skill_Test_Frontend
      dockerfile: Dockerfile
    container_name: hexagon-frontend
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
    volumes:
      - ./GBastos.Hexagon-Skill_Test_Frontend:/usr/src/app
    command: npm run start
    depends_on:
      - backend
    restart: always

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hexagon-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: hexagon-rabbit
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

volumes:
  sql_data: